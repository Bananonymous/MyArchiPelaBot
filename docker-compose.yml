services:
  archipelabot:
    build: .
    # host networking exposes all game ports (38281-38380) without individual mappings
    network_mode: host
    restart: unless-stopped
    cap_add:
      - SYS_PTRACE  # lets py-spy/gdb attach to stuck ArchipelagoGenerate processes for debugging
    volumes:
      - ./config.json:/app/config.json:ro
      - ./data:/data
      # Minecraft Forge server directory (contains forge jar, mods/, APData/).
      # Set "minecraftServerPath": "/opt/minecraft" in config.json.
      # Change ~/Minecraft below to wherever your Forge server lives on the host.
      - ~/Minecraft:/opt/minecraft
      # Let's Encrypt certs for WSS support on AP server ports (optional).
      # Certs live at ~/botc-assistant/ssl/certbot/conf on this host.
      - /opt/botc-assistant/ssl/certbot/conf:/etc/letsencrypt:ro
    environment:
      - NODE_ENV=production
